version: '3.8'

services:
  mongodb:
    image: mongo:5.0
    container_name: kreeda-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: krida

  backend:
    build: .
    container_name: kreeda-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongodb:27017/krida
      - JWT_SECRET=${JWT_SECRET}
      - PORT=4000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app/backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data: